version: "3.8"

services:
  test:
    build: .
    image: exam_bot:alpine
    container_name: exam_con
    restart: always
    command: "python3 main.py"


  pg:
    image: postgres:alpine
    container_name: exam_db
    restart: always
    environment:
      POSTGRES_PASSWORD: "12"
      POSTGRES_DB: exam_base
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
